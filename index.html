    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('geargen-theme')
          document.documentElement.setAttribute(
            'data-theme',
            t === 'light' || t === 'dark' ? t : 'dark',
          )
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
